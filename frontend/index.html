
<!DOCTYPE html>
<html>
<body>
<h2>AI Todo</h2>
<input id=t><button onclick=add()>Add</button>
<ul id=list></ul>
<script>
async function load(){
 let r=await fetch("http://127.0.0.1:8000/todos");let d=await r.json();
 list.innerHTML=d.map(x=>`<li>${x.title}</li>`).join("");
}
async function add(){
 await fetch("http://127.0.0.1:8000/todos?title="+t.value,{method:"POST"});load();
}
load();
</script>
</body>
</html>
